<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="superGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00AAFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Blue S Logo -->
  <g transform="translate(50, 50)">
    <!-- Top curve of S -->
    <path d="M 30 10 Q 50 10 50 25 Q 50 35 35 40 Q 20 45 20 55" fill="none" stroke="url(#superGradient)" stroke-width="8" stroke-linecap="round"/>
    <!-- Bottom curve of S -->
    <path d="M 20 55 Q 20 65 35 70 Q 50 75 50 85 Q 50 100 30 100" fill="none" stroke="url(#superGradient)" stroke-width="8" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="100" y="170" font-size="16" font-weight="bold" text-anchor="middle" fill="currentColor" font-family="Arial, sans-serif">SUPERWORLD</text>
</svg>
