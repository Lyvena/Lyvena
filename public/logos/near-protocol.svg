<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="nearGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00AAFF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- NEAR Logo Symbol (Double chevron/arrow) -->
  <g transform="translate(30, 50)">
    <!-- Left chevron -->
    <path d="M 20 20 L 40 40 L 20 60" fill="none" stroke="url(#nearGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right chevron -->
    <path d="M 50 20 L 70 40 L 50 60" fill="none" stroke="url(#nearGradient)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Text -->
  <text x="100" y="170" font-size="18" font-weight="bold" text-anchor="middle" fill="currentColor" font-family="Arial, sans-serif">near</text>
</svg>
